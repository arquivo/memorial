services:
  memorial:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memorial
    ports:
      - "80:8000" # Map port 80 on the host to port 8000 in the container
    # environment:
      # Override default Wayback Machine servers if needed
      # - WAYBACK_SERVER=https://arquivo.pt/wayback/
      # - WAYBACK_NOFRAME_SERVER=https://arquivo.pt/noFrame/replay/
      # - WAYBACK_REQUEST_TIMEOUT=3
      
      # Custom configuration file path (optional)
      # - MEMORIAL_CONFIGURATION=/app/custom_config.py
      
      # Strip port from hostname for config lookup (useful for local development)
      # Converts "example.com:8080" to "example.com" when looking up site config
      # Recommended: enable only in development, not in production
      # - MEMORIAL_STRIP_PORT=true
    # Uncomment for development: mount local code for live reload
    volumes:
      - ../memorial-site-images:/memorial-site-images:ro
    #   - ./memorial.py:/app/memorial.py:ro
    #   - ./config.py:/app/config.py:ro
    #   - ./templates:/app/templates:ro
    #   - ./static:/app/static:ro
    restart: unless-stopped
